<!-- Hero Banner -->
<section class="hero">
  <div class="hero-content">
    <div class="breadcrumb">Home / Contact Us</div>
    <h1 class="hero-title">Contact Us</h1>
    <p class="hero-subtitle">Get in touch with our team. We're here to help.</p>
  </div>
</section>

<!-- Contact Info Cards -->
<section class="contact-info-section">
  <div class="page-inner">
    <div class="info-cards">
      <div class="info-card">
        <div class="info-icon phone-icon"></div>
        <h3>Phone</h3>
        <p class="info-main">404-369-3414</p>
        <p class="info-sub">Mon - Fri, 9 AM - 5 PM</p>
      </div>

      <div class="info-card">
        <div class="info-icon email-icon"></div>
        <h3>Email</h3>
        <p class="info-main">info@somahire.com</p>
        <p class="info-sub">We respond within 24 hours</p>
      </div>

      <div class="info-card">
        <div class="info-icon address-icon"></div>
        <h3>Address</h3>
        <p class="info-main">205 Pond Trace</p>
        <p class="info-sub">Fayetteville, Georgia 30215</p>
      </div>
    </div>
  </div>
</section>

<!-- Contact Form + Map -->
<section class="contact-form-section">
  <div class="page-inner">
    <div class="form-map-wrapper">
      <!-- Contact Form -->
      <div class="form-column">
        <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              [(ngModel)]="formData.fullName"
              placeholder="Your name"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              [(ngModel)]="formData.phone"
              placeholder="404-369-3414"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="formData.email"
              placeholder="your.email@company.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="company">Company</label>
            <input
              type="text"
              id="company"
              name="company"
              [(ngModel)]="formData.company"
              placeholder="Your company name"
              required
            />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              [(ngModel)]="formData.message"
              placeholder="Tell us about your inquiry..."
              rows="5"
              required
            ></textarea>
          </div>

          <button type="submit" class="btn btn-submit">Send Message</button>
        </form>
      </div>

      <!-- Map Placeholder -->
      <div class="map-column">
        <img src="/images/image9.jpg" alt="Office Location Map" class="map-image" />
      </div>
    </div>
  </div>
</section>

<!-- Call CTA Banner -->
<section class="call-banner">
  <div class="page-inner">
    <div class="banner-content">
      <h2>Prefer to Talk? Give Us a Call</h2>
      <button class="btn btn-call">Call 404-369-3414</button>
    </div>
  </div>
</section>
