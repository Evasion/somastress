<!-- Main Footer Content -->
<footer class="footer">
  <div class="footer-content">
    <!-- Column 1: Company Info -->
    <div class="footer-column footer-company">
      <img src="/images/logo-white.png" alt="SomaHire Logo" class="footer-logo" />
      <p class="footer-tagline">{{ contactInfo.tagline }}</p>
      <p class="footer-description">
        {{ contactInfo.description }}
      </p>
    </div>

    <!-- Column 2: Quick Links -->
    <div class="footer-column">
      <h4 class="footer-column-title">Quick Links</h4>
      <ul class="footer-links">
        <li *ngFor="let link of quickLinks">
          <a [routerLink]="link.route" class="footer-link">
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>

    <!-- Column 3: Resources -->
    <div class="footer-column">
      <h4 class="footer-column-title">Resources</h4>
      <ul class="footer-links">
        <li *ngFor="let resource of resources">
          <a [routerLink]="resource.route" class="footer-link">
            {{ resource.label }}
          </a>
        </li>
      </ul>
    </div>

    <!-- Column 4: Contact -->
    <div class="footer-column">
      <h4 class="footer-column-title">Contact</h4>
      <ul class="footer-contact">
        <li class="footer-contact-item">
          <a href="https://maps.google.com/?q=123+Business+Avenue,+Atlanta,+GA+30303" target="_blank" rel="noopener noreferrer" class="footer-link">
            {{ contactInfo.address }}
          </a>
        </li>
        <li class="footer-contact-item">
          <a href="tel:{{ contactInfo.phone }}" class="footer-link">
            {{ contactInfo.phone }}
          </a>
        </li>
        <li class="footer-contact-item">
          <a href="mailto:{{ contactInfo.email }}" class="footer-link">
            {{ contactInfo.email }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</footer>

<!-- Bottom Footer Bar -->
<div class="footer-bottom">
  <div class="footer-bottom-content">
    <p class="footer-copyright">
      &copy; {{ currentYear }} {{ contactInfo.company }}. All rights reserved.
    </p>
  </div>
</div>
